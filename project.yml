name: NowThis
options:
  bundleIdPrefix: com.asecretcompany
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    GENERATE_INFOPLIST_FILE: "YES"
    PRODUCT_BUNDLE_IDENTIFIER: com.asecretcompany.nowthis
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "53"

targets:
  NowThis:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NowThis
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asecretcompany.nowthis
        INFOPLIST_FILE: NowThis/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: NowThis
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
    entitlements:
      path: NowThis/NowThis.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.asecretcompany.nowthis
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.asecretcompany.nowthis
    dependencies:
      - target: NowThisWidget
        embed: true

  NowThisTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NowThisTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asecretcompany.nowthis.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NowThis.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/NowThis"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: NowThis

  NowThisWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    createIntermediateGroups: true
    sources:
      - path: NowThisWidget
        excludes:
          - "**/.DS_Store"
      - path: NowThis/Models
      - path: NowThis/App/AppConstants.swift
      - path: NowThis/Intents/CompleteTaskIntent.swift
      - path: NowThis/Intents/WidgetConfigurationIntent.swift
      - path: NowThis/Utilities/DueDateHelper.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asecretcompany.nowthis.widget
        INFOPLIST_FILE: NowThisWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: NowThis Widget
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SKIP_INSTALL: "YES"
    entitlements:
      path: NowThisWidget/NowThisWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.asecretcompany.nowthis

schemes:
  NowThis:
    build:
      targets:
        NowThis: all
        NowThisWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NowThisTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
